    category: "jus_nectars"

# ============================================================================
# Paramètres de collecte
# ============================================================================

collection:
  # Nombre max de commentaires à récupérer par post
  max_comments_per_post: 500

  # Nombre max de posts à récupérer par page (mode discovery)
  max_posts_per_page: 50

  # Inclure les réponses aux commentaires
  include_replies: true

  # Tri des commentaires : RANKED_UNFILTERED | MOST_RELEVANT | RECENT_ACTIVITY
  sort_order: "RANKED_UNFILTERED"

  # Ne collecter que les commentaires plus récents que cette date (optionnel)
  # Format : YYYY-MM-DD ou relatif ("6 months", "1 year")
  comments_newer_than: null

  # Pause en secondes entre chaque appel API (rate limiting)
  delay_between_calls: 2

  # Nombre de tentatives en cas d'erreur
  max_retries: 3

# ============================================================================
# Chemins de sortie (relatifs au dossier du script)
# ============================================================================

output:
  raw_dir: "output/raw"
  merged_file: "output/all_comments.csv"
  stats_file: "output/collection_stats.json"
