# ============================================================================
# RamyPulse — Pages Facebook & Instagram cibles
# ============================================================================
# Modifier ce fichier pour ajouter/retirer des marques ou des posts.
#
# Structure :
#   brands:
#     - name: Nom de la marque
#       facebook_page: URL de la page Facebook
#       instagram_profile: URL du profil Instagram (optionnel)
#       facebook_posts: liste d'URLs de posts spécifiques (optionnel)
#       instagram_posts: liste d'URLs de posts spécifiques (optionnel)
#       category: catégorie produit
# ============================================================================

brands:
  - name: "Ramy"
    facebook_page: "https://www.facebook.com/ramy.jus"
    instagram_profile: "https://www.instagram.com/ramy_officiel/"
    facebook_posts: []      # Ajouter ici des URLs de posts spécifiques
    instagram_posts: []
    category: "jus_boissons"

  - name: "Hamoud Boualem"
    facebook_page: "https://www.facebook.com/HamoudLaBlanche/"
    instagram_profile: "https://www.instagram.com/hamoudboualem_officiel/"
    facebook_posts: []
    instagram_posts: []
    category: "boissons_gazeuses"

  - name: "Ifri"
    facebook_page: "https://www.facebook.com/ifaborijia/"
    instagram_profile: "https://www.instagram.com/ifri_officiel/"
    facebook_posts: []
    instagram_posts: []
    category: "eau_boissons"

  - name: "NCA Rouiba"
    facebook_page: "https://www.facebook.com/NCA.Rouiba/"
    instagram_profile: "https://www.instagram.com/nca_rouiba/"
